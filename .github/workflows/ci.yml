name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '0 8 * * 1'  # Every Monday at 08:00 UTC

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    name: Tests - PHP ${{ matrix.php }} / Laravel ${{ matrix.laravel }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - php: '8.4'
            laravel: '12.*'
            testbench: '^10.0'
            coverage: true
            # Laravel 12.62.0's Illuminate\Support\Carbon::plus() override is incompatible
            # with nesbot/carbon 3.12.0 (which added a ?bool $overflow param) - fatal on boot.
            # Pin carbon below 3.12 for the L12 row until Laravel 12 ships a compatible release.
            # TODO: remove this constraint once Laravel 12 is fixed.
            constraints: '"nesbot/carbon:<3.12"'
          - php: '8.4'
            laravel: '13.*'
            testbench: '^11.0'
          - php: '8.5'
            laravel: '13.*'
            testbench: '^11.0'
          - php: '8.5'
            laravel: '12.*'
            testbench: '^10.0'
            # Same Carbon pin as the 8.4/L12 row: Laravel 12.62's Carbon::plus()
            # override is fatal with nesbot/carbon 3.12. Keep until L12 is fixed.
            constraints: '"nesbot/carbon:<3.12"'

    steps:
      - uses: actions/checkout@v7

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, bcmath, intl, fileinfo
          coverage: ${{ matrix.coverage && 'xdebug' || 'none' }}

      - name: Cache Composer dependencies
        uses: actions/cache@v6
        with:
          path: vendor
          key: composer-${{ matrix.php }}-${{ matrix.laravel }}-${{ hashFiles('composer.lock') }}
          restore-keys: composer-${{ matrix.php }}-${{ matrix.laravel }}-

      - name: Install dependencies
        run: |
          composer require "laravel/framework:${{ matrix.laravel }}" "orchestra/testbench:${{ matrix.testbench }}" ${{ matrix.constraints }} --no-interaction --no-update
          composer update --prefer-stable --prefer-dist --no-interaction

      - name: Run tests
        timeout-minutes: 5
        run: vendor/bin/pest --log-junit=build/report.junit.xml ${{ matrix.coverage && '--coverage-text --coverage-clover=coverage.xml' || '--no-coverage' }}

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-php${{ matrix.php }}-laravel${{ matrix.laravel == '12.*' && '12' || matrix.laravel == '13.*' && '13' || matrix.laravel }}
          path: build/report.junit.xml
          retention-days: 7

      - name: Upload coverage to Codecov
        if: matrix.coverage
        uses: codecov/codecov-action@v7
        with:
          files: coverage.xml
          fail_ci_if_error: false

  static-analysis:
    name: PHPStan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, bcmath, intl, fileinfo
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v6
        with:
          path: vendor
          key: composer-phpstan-${{ hashFiles('composer.lock') }}
          restore-keys: composer-phpstan-

      - name: Install dependencies
        run: composer update --prefer-stable --prefer-dist --no-interaction

      - name: Cache PHPStan results
        uses: actions/cache@v6
        with:
          path: /tmp/phpstan
          key: phpstan-${{ hashFiles('src/**/*.php') }}
          restore-keys: phpstan-

      - name: Run PHPStan
        run: vendor/bin/phpstan analyse --memory-limit=512M

  code-style:
    name: Code Style
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v6
        with:
          path: vendor
          key: composer-pint-${{ hashFiles('composer.lock') }}
          restore-keys: composer-pint-

      - name: Install dependencies
        run: composer update --prefer-stable --prefer-dist --no-interaction

      - name: Check code style
        run: vendor/bin/pint --test
