name: Release

on:
  push:
    tags:
      - 'v*'

# Least privilege: granted per-job. `tests` only reads; only `release` writes.
permissions:
  contents: read

jobs:
  tests:
    name: Verify tests pass
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v7

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, bcmath, intl, fileinfo
          coverage: none

      - name: Install dependencies
        run: composer update --prefer-stable --prefer-dist --no-interaction

      - name: Run tests
        timeout-minutes: 5
        run: vendor/bin/pest --no-coverage

  release:
    name: Create GitHub Release
    needs: tests
    runs-on: ubuntu-latest
    # Gate publishing behind the `release` environment. Configure it in repo
    # Settings -> Environments with required reviewers to make every release a
    # manual approval (no-op until configured). Pair with a protected-tag
    # ruleset (`v*` creatable only by maintainers) — the real publish control.
    environment: release
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Extract changelog for this version
        id: changelog
        run: |
          # Extract section between this version header and next version header
          VERSION="${{ steps.version.outputs.version }}"
          CHANGELOG=$(awk "/^## \[${VERSION}\]/{found=1; next} /^## \[/{if(found) exit} found{print}" CHANGELOG.md)

          # Hard guard: refuse to publish a release that has no CHANGELOG entry.
          # This blocks accidental/empty tags and forces documented release notes.
          if [ -z "$(echo "$CHANGELOG" | tr -d '[:space:]')" ]; then
            echo "::error::No CHANGELOG.md section found for version ${VERSION}. Refusing to publish a release without release notes."
            exit 1
          fi

          # Write to file to preserve multiline
          echo "$CHANGELOG" > /tmp/release_notes.md

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          name: v${{ steps.version.outputs.version }}
          body_path: /tmp/release_notes.md
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
